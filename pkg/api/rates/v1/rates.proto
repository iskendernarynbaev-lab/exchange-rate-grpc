syntax = "proto3";

package rates.v1;

option go_package = "github.com/iskendernarynbaev-lab/exchange-rate-grpc/pkg/api/rates/v1;ratesv1";

message GetRatesRequest {
  string method = 1;
  int32 n = 2;
  int32 m = 3;
}

message GetRatesResponse {
  double ask = 1;
  double bid = 2;
  string timestamp = 3;
  int64 unix_millis = 4;
}

service RatesService {
  rpc GetRates(GetRatesRequest) returns (GetRatesResponse);
}
